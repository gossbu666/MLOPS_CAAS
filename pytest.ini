[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary for failures/errors
addopts =
    -v
    --tb=short
    --no-header

# Suppress tensorflow/numpy deprecation noise
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning
